<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード管理画面</title>
<style>
  :root { --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a; --green: #1db954; --text: #e8e8f0; --text-muted: #6e6e8a; --red: #f85149; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; }
  button { background: var(--green); color: #000; border: none; padding: 10px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
  .event-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
  .btn-del { background: var(--red); color: white; padding: 4px 8px; font-size: 12px; width: auto; }
  .links { margin-top: 20px; text-align: center; }
  a { color: var(--green); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>⚙️ イベント管理パネル</h1>
  
  <div class="card">
    <h3>新規イベント追加</h3>
    <div class="form-group">
      <label>イベント表示名（例: ショーケースA）</label>
      <input type="text" id="ev-label" placeholder="ダンスイベント2026">
    </div>
    <div class="form-group">
      <label>スプレッドシートID</label>
      <input type="text" id="ev-sheetid" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmU...">
    </div>
    <div class="form-group">
      <label>シート名（正確に入力）</label>
      <input type="text" id="ev-sheetname" placeholder="音源提出状況">
    </div>
    <button onclick="addEvent()">イベントを追加保存</button>
  </div>

  <div class="card">
    <h3>登録済みイベント一覧</h3>
    <div id="event-list"></div>
  </div>

  <div class="links">
    <a href="index.html">➔ メインのダッシュボードを開く</a>
  </div>
</div>

<script>
let events = JSON.parse(localStorage.getItem('dashboard_events')) || [];

function renderList() {
  const list = document.getElementById('event-list');
  if(events.length === 0) { list.innerHTML = '<p style="color:var(--text-muted)">登録されたイベントはありません</p>'; return; }
  list.innerHTML = '';
  events.forEach((ev, idx) => {
    const div = document.createElement('div');
    div.className = 'event-item';
    div.innerHTML = `
      <div>
        <strong>${ev.label}</strong><br>
        <small style="color:var(--text-muted)">シート: ${ev.sheetName}</small>
      </div>
      <button class="btn-del" onclick="deleteEvent(${idx})">削除</button>
    `;
    list.appendChild(div);
  });
}

function addEvent() {
  const label = document.getElementById('ev-label').value.trim();
  const sheetId = document.getElementById('ev-sheetid').value.trim();
  const sheetName = document.getElementById('ev-sheetname').value.trim();
  
  if(!label || !sheetId || !sheetName) { alert('すべての項目を入力してください'); return; }
  
  events.push({ label, sheetId, sheetName });
  localStorage.setItem('dashboard_events', JSON.stringify(events));
  
  // フォームクリア
  document.getElementById('ev-label').value = '';
  document.getElementById('ev-sheetname').value = '';
  renderList();
}

function deleteEvent(idx) {
  if(!confirm('本当に削除しますか？')) return;
  events.splice(idx, 1);
  localStorage.setItem('dashboard_events', JSON.stringify(events));
  renderList();
}

renderList();
</script>
</body>
</html>
